<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" type="image/x-icon" href="./img/news.png" />
  <link rel="stylesheet" href="./style.css" />
  <title>News Site</title>
</head>

<body class="relative">
  <!-- Navbar -->
  <nav class="bg-gray-900 text-white relative">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <img src="./img/news.png" alt="logo news site" class="w-10 h-10" />
        <h1 class="font-bold text-lg cursor-pointer">
          <a href="./index.html">News Site</a>
        </h1>
      </div>

      <!-- Desktop Menu -->
      <ul class="hidden md:flex gap-6">
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="./index.html">Home</a>
        </li>
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="#">Matches</a>
        </li>
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="#">Statices</a>
        </li>
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="#">Table</a>
        </li>
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="#LiveServer"><i class="fa-solid fa-circle text-xs text-red-600 animate-blink-scale"></i>
            Live</a>
        </li>
      </ul>

      <!-- Right Icons -->
      <div class="flex gap-4 items-center">



        <!-- Menu Bar for Mobile -->
        <i class="fa-solid fa-bars cursor-pointer md:hidden text-xl" id="menuBtn"></i>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div class="hidden md:hidden bg-gray-900" id="mobileMenu">
      <ul class="flex flex-col p-4 gap-3">
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="./index.html">Home</a>
        </li>
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="#">Matches</a>
        </li>
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="#">Statices</a>
        </li>
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="#">Table</a>
        </li>
        <li
          class="p-2 font-bold cursor-pointer border border-transparent hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
          <a href="#LiveServer"><i class="fa-solid fa-circle text-xs text-red-600 animate-blink-scale" id="liveDot"></i>
            Live</a>
        </li>
      </ul>
    </div>
  </nav>



  <div class=" mx-auto flex flex-col-reverse md:flex-row gap-4">
    <!-- الأحمر -->
    <div class="w-full md:w-3/4 bg-red-500 p-4">
      <h2 class="font-bold text-white mb-2">Main Content</h2>

      <p class="text-white"></p>
    </div>

    <!-- الأزرق: Cards -->
    <div class="w-full md:w-1/4 bg-blue-200 p-4">
      <div id="cardsContainer"
        class="flex flex-col md:flex-col gap-4 overflow-x-visible md:overflow-x-auto overflow-y-visible md:overflow-y-hidden whitespace-normal md:whitespace-nowrap scrollbar-hide">
        <!-- Weather card-->
        <div
          class="card min-w-[180px] h-50 bg-white  rounded-xl shadow-lg flex flex-col justify-between p-4  overflow-hidden">
          <!-- Header: City & Time -->
          <div class="flex flex-row justify-between items-center w-full">
            <h2 id="city" class="text-lg font-semibold truncate"></h2>
            <p id="time" class="text-md truncate"></p>
          </div>

          <!-- Weather Icon -->
          <div class="flex items-center justify-center my-2">
            <img id="weatherIcon" class="w-16 h-16" src="" alt="weather icon" />
          </div>

          <!-- Weather Description & Temp -->
          <div class="flex flex-col items-center">
            <p id="temp" class="text-3xl font-bold mt-2"></p>
            <p id="weatherDesc" class="text-sm mt-1 capitalize truncate">

            </p>
          </div>

          <!-- Footer: AQI & Temp Range -->
          <div class="flex justify-between text-xs mt-2 w-full">
            <p id="aqi" class="truncate"></p>
            <p id="tempRange" class="truncate"></p>
          </div>
        </div>

        <!-- Card 2: Dollar & SAR -->
        <div class="card min-w-[240px] h-auto bg-white rounded-xl shadow-lg flex flex-col p-4 gap-4">
          <h2 class="font-semibold text-lg">Currency Exchange</h2>

          <!-- Current Rates -->
          <div class="flex justify-center text-md gap-4">
            <p>USD: <span id="usdRate">-</span></p>
            <p>SAR: <span id="sarRate">-</span></p>
            <p>EGP: <span id="egpRate">-</span></p>
          </div>

          <!-- Currency Converter Card -->
          <div class="max-w-sm mx-auto bg-white shadow-lg rounded-2xl p-6 border border-gray-200">
            <h2 class="text-xl font-semibold text-gray-800 mb-4 text-center">Currency Converter</h2>

            <div class="flex flex-col gap-4">
              <!-- Input Amount -->
              <input type="number" id="amountInput" placeholder="Enter amount"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 text-gray-700 font-medium">

              <!-- Currency Select -->
              <select id="currencySelect"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 text-gray-700 font-medium">
                <option value="USD">USD</option>
                <option value="SAR">SAR</option>
              </select>

              <!-- Converted Result -->
              <p class="text-gray-800 font-semibold text-lg text-center">
                = <span id="convertedAmount" class="text-blue-600">0</span> EGP
              </p>
            </div>
          </div>
        </div>


        
        <!-- <div class="card min-w-[180px] h-48 bg-white rounded-xl shadow-lg flex items-center justify-center p-4"> -->
          <div id="LiveServer">
            <div id="liveMatchesContainer" class="flex gap-4 flex-wrap">
            <!-- هنا هتظهر كل الـ Cards تلقائيًا من JS -->
          </div>
          </div>
        <!-- </div> -->
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="./script.js"></script>
</body>

</html>
