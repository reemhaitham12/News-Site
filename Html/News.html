<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/x-icon" href="../img/news.png" />
    <link rel="stylesheet" href="../style.css" />
    <title>News</title>
</head>

<body class="bg-gray-100">
    <!-- Navbar -->
    <nav class="bg-gray-900 text-white relative">
        <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
            <div class="flex items-center gap-2">
                <img src="../img/news.png" alt="logo news site" class="w-10 h-10" />
                <h1 class="font-bold text-lg cursor-pointer">
                    <a href="../index.html">News Site</a>
                </h1>
            </div>

            <!-- Desktop Menu -->
            <ul class="hidden md:flex gap-6">
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="../index.html">Home</a>
                </li>
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="./News.html">News</a>
                </li>
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="#">Matches</a>
                </li>
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="#">Statices</a>
                </li>
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="#">Table</a>
                </li>
            </ul>

            <!-- Mobile Menu Button -->
            <div class="flex gap-4 items-center">
                <i class="fa-solid fa-bars cursor-pointer md:hidden text-xl" id="menuBtn"></i>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="hidden md:hidden bg-gray-900" id="mobileMenu">
            <ul class="flex flex-col p-4 gap-3">
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="../index.html">Home</a>
                </li>
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="./News.html">News</a>
                </li>
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="#">Matches</a>
                </li>
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="#">Statices</a>
                </li>
                <li class="p-2 font-bold hover:border-blue-500 hover:bg-blue-400 hover:rounded-lg">
                    <a href="#">Table</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Categories -->
    <div class="max-w-6xl mx-auto p-4">
        <div class="flex flex-wrap gap-3 justify-center md:justify-start mb-6">
            <a href="./News.html?category=all"
                class="px-4 py-2 bg-white rounded-lg shadow hover:bg-blue-400 hover:text-white font-semibold">All</a>

            <a href="./News.html?category=world"
                class="px-4 py-2 bg-white rounded-lg shadow hover:bg-blue-400 hover:text-white font-semibold">World</a>

            <a href="./News.html?category=business"
                class="px-4 py-2 bg-white rounded-lg shadow hover:bg-blue-400 hover:text-white font-semibold">Business</a>

            <a href="./News.html?category=technology"
                class="px-4 py-2 bg-white rounded-lg shadow hover:bg-blue-400 hover:text-white font-semibold">Technology</a>

            <a href="./News.html?category=entertainment"
                class="px-4 py-2 bg-white rounded-lg shadow hover:bg-blue-400 hover:text-white font-semibold">Entertainment</a>

            <a href="./News.html?category=sport"
                class="px-4 py-2 bg-white rounded-lg shadow hover:bg-blue-400 hover:text-white font-semibold">Sport</a>

            <a href="./News.html?category=science"
                class="px-4 py-2 bg-white rounded-lg shadow hover:bg-blue-400 hover:text-white font-semibold">Science</a>

            <a href="./News.html?category=health"
                class="px-4 py-2 bg-white rounded-lg shadow hover:bg-blue-400 hover:text-white font-semibold">Health</a>

            <a href="./News.html?category=travel"
                class="px-4 py-2 bg-white rounded-lg shadow hover:bg-blue-400 hover:text-white font-semibold">travel</a>
        </div>

        <!-- Page Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 id="pageTitle" class="text-3xl font-bold">News</h1>
            <a href="../index.html" class="text-blue-500 hover:underline font-semibold">Back</a>
        </div>

        <!-- News Cards -->
        <div id="newsCardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <!-- Load More -->
        <div class="flex justify-center mt-8">
            <button id="loadMoreBtn" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">
                Load More
            </button>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById("menuBtn");
        const mobileMenu = document.getElementById("mobileMenu");

        menuBtn.addEventListener("click", () => {
            mobileMenu.classList.toggle("hidden");
        });
    </script>

    <script type="module" src="../apiKey/newsPage.js"></script>
</body>

</html>
